<div *ngIf="currentMessage"
     class="fixed top-6 right-6 px-6 py-3 rounded-lg shadow-lg text-white transition-all duration-300 animate-fade-in"
     [ngClass]="{
       'bg-green-500': status === 'success',
       'bg-red-500': status === 'error'
     }">
  {{ currentMessage }}
</div>

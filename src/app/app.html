@if (notification().message) {
  <div class="fixed top-6 right-6 px-6 py-3 rounded-lg shadow-lg text-white transition-all duration-300 animate-fade-in z-50"
       [ngClass]="{
         'bg-green-500': notification().status === 'success',
         'bg-red-500': notification().status === 'error'
       }">
    {{ notification().message }}
  </div>
}

<div class="max-w-2xl mx-auto mt-10 p-6 bg-white shadow-lg rounded-xl space-y-6">

  <h1 class="text-4xl font-bold text-center text-gray-800">
    ToDo App
  </h1>

  <app-todo-input
    (add)="onAddTodo($event.title, $event.description)"
    class="block">
  </app-todo-input>

  <app-todo-list
    [todos]="todos"
    (toggle)="ontoggleTodo($event)"
    (delete)="onDeleteTodo($event)"
    (select)="onSelectTodo($event)"
    (edit)="onEditTodo($event.id, $event.title, $event.description)"
    class="block">
  </app-todo-list>

</div>

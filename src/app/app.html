
<div class="max-w-2xl mx-auto mt-10 p-6 bg-gray-300 border-gray-800 shadow-lg rounded-xl space-y-6">

  <h1 class="text-4xl font-bold text-center text-gray-800">
    ToDo App
  </h1>

  <app-todo-input
    (add)="onAddTodo($event.title, $event.description)"
    class="block">
  </app-todo-input>
  @if (todoService.notification.message) {
    <div 
      class="fixed top-5 left-1/2 -translate-x-1/2  px-6 py-3 rounded-lg shadow-lg text-white font-bold"
      [class.bg-green-600]="todoService.notification.type === 'success'"
      [class.bg-red-600]="todoService.notification.type === 'error'"
    >
      {{ todoService.notification.message }}
    </div>
  }

  <app-todo-list
    [todos]="todos"
    (toggle)="ontoggleTodo($event)"
    (delete)="onDeleteTodo($event)"
    (select)="onSelectTodo($event)"
    (edit)="onEditTodo($event.id, $event.title, $event.description)"
    class="block">
  </app-todo-list>

</div>

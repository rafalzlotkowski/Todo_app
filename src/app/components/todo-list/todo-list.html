<div class="space-y-4">
    <p class="text-2xl text-center">Lista zadań</p>
    <div class="bg-gray-300 w-full p-3 border rounded-xl space-y-3">

  <div class="flex items-center gap-2">
    <input 
      type="checkbox"
      #allCheck
      (change)="toggleAll(allCheck.checked)"
      id="toggle-all"
      class="size-4"
    >
    <label for="toggle-all" class="font-semibold ">
      Zaznacz wszystkie zadania
    </label>
  </div>

  <div class="flex flex-col gap-1">
    <p class="font-semibold">Sortuj</p>
    <select 
      class="w-full p-2 border border-gray-400 rounded-lg bg-white"
      (change)="onFilterChange($event)"
    >
      <option value="all">Wszystkie</option>
      <option value="completed">Zakończone</option>
      <option value="incomplete">Niezakończone</option>
      <option value="date-asc">Data zakończenia: od najbliższej</option>
      <option value="date-desc">Data zakończenia: od najdalszej</option>
      <option value="low">Priorytet niski</option>
      <option value="medium">Priorytet średni</option>
      <option value="high">Priorytet wysoki</option>
    </select>
  </div>

</div>

  @for (todo of todos; track todo.id) { 
    <div class="p-1 bg-gray-300 rounded-xl shadow-lg mb-2">
      <app-todo-item
        [todo]="todo"
        (delete)="delete.emit($event)"
        (edit)="edit.emit($event)"
        (toggle)="toggle.emit($event)">
      </app-todo-item>
    </div>
  } @empty {
    <p class="text-center font-bold">Brak zadań na liście.</p>
  }
</div>

<form #todoForm="ngForm" (ngSubmit)="submit()" class="p-6 bg-white rounded-xl shadow-lg space-y-4">
  
  <div>
    <label for="title" class="block text-lg font-semibold text-gray-700">Zadanie:</label>
    <input
      required
      name="title"
      [(ngModel)]="title"
      #titleField="ngModel"
      type="text"
      id="title"
      class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
      [class.border-red-500]="titleField.invalid && titleField.touched"
      [class.border-gray-300]="!(titleField.invalid && titleField.touched)"
    />
    <span class="text-red-500 text-sm" *ngIf="titleField.invalid && titleField.touched">
      Zadanie jest wymagane.
    </span>
  </div>

  <div>
    <label for="description" class="block text-lg font-semibold text-gray-700">Opis:</label>
    <textarea
      name="description"
      [(ngModel)]="description"
      id="description"
      rows="4"
      class="w-full px-4 py-2 border border-gray-300 rounded-lg resize-none focus:ring-2 focus:ring-blue-500 outline-none"
    ></textarea>
  </div>

  <button
    type="submit"
    [disabled]="todoForm.invalid"
    class="w-full py-2 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700 transition-colors disabled:bg-gray-400 disabled:cursor-not-allowed"
  >
    Dodaj
  </button>

</form>

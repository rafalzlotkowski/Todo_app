<div class="p-6 bg-white rounded-xl shadow-lg space-y-4">

  <p class="text-lg font-semibold text-gray-700">Zadanie:</p>
  <input
  [(ngModel)]="title"
    type="text"
    id="title"
    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
  />

  <p class="text-lg font-semibold text-gray-700">Opis:</p>
  <textarea
  [(ngModel)]="description"
    id="description"
    rows="4"
    class="w-full px-4 py-2 border border-gray-300 rounded-lg resize-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
  ></textarea>

  <button
    (click)="submit()"
    class="w-full py-2 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700 transition-colors"
  >
    Dodaj
  </button>

</div>

<div class="bg-gray-400 p-6 rounded-xl shadow-lg space-y-4">
    
    <button (click)="onToggleComplete()  " >Zadanie: {{ todo.title }}</button>
    @if (todo.description) {
        <p>Opis: {{ todo.description }}</p>
    }
    <p>Data zakończenia: {{todo.dueDate | date:'dd.MM.yyyy' }}</p>
    <p>Status: {{ todo.completed ? 'Zakończone' : 'Niezakończone' }}</p>
    <input type="checkbox" 
        [checked]="todo.completed" 
        (change)="onToggleComplete()" 
        class="size-5">    
    <button [routerLink]="['/edit',todo.id]" class="bg-yellow-400 hover:bg-yellow-600 text-white font-semibold py-2 px-4 rounded-lg">Edit</button>
    <button (click)="deleteitem()" class="bg-red-500 hover:bg-red-600 text-white font-semibold py-2 px-4 rounded-lg ">Delete </button>
       
</div>

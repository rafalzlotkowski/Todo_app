<div class="max-w-2xl mx-auto mt-10 p-6 bg-gray-300 border-gray-800 shadow-lg rounded-xl space-y-6">

  <h1 class="text-4xl font-bold text-center text-gray-800">
    ToDo App
  </h1>

  <app-todo-input
    (add)="onAddTodo($event.title, $event.description)"
    class="block">
  </app-todo-input>
 
@if (currentMessage) {
  <div class="p-6 bg-gray-300 rounded-xl shadow-lg space-y-4 text-green-600   text-center transition-all">
    {{ currentMessage }}
  </div>
}

  <app-todo-list
    [todos]="todos"
    (toggle)="ontoggleTodo($event)"
    (delete)="onDeleteTodo($event)"
    (select)="onSelectTodo($event)"
    (edit)="onEditTodo($event)"
    class="block">
  </app-todo-list>

</div>
